name: Build and Release Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'binaries/**'
      - 'README.md'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            studio_binary: target-build/release/sytra-studio.exe
            mcp_binary: target-build/release/sytra-mcp.exe
          - os: macos-latest
            platform: macos
            studio_binary: target-build/release/sytra-studio
            mcp_binary: target-build/release/sytra-mcp
          - os: ubuntu-latest
            platform: linux
            studio_binary: target-build/release/sytra-studio
            mcp_binary: target-build/release/sytra-mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd ui
          npm ci

      - name: Build Frontend
        run: |
          cd ui
          npm run build

      - name: Install System Dependencies (Linux only)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Build Sytra MCP Server
        run: cargo build -p sytra-mcp --release

      - name: Build Sytra Studio UI
        run: cargo build -p sytra-studio --release --features custom-protocol

      - name: Upload Binaries Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            ${{ matrix.studio_binary }}
            ${{ matrix.mcp_binary }}
          retention-days: 1

  commit-binaries:
    name: Commit Binaries to Git
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-windows
          path: temp-binaries/windows

      - name: Download macOS Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-macos
          path: temp-binaries/macos

      - name: Download Linux Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: temp-binaries/linux

      - name: Organize Binaries
        run: |
          mkdir -p binaries/windows binaries/macos binaries/linux
          
          # Copy Windows
          cp temp-binaries/windows/sytra-studio.exe binaries/windows/
          cp temp-binaries/windows/sytra-mcp.exe binaries/windows/
          
          # Copy macOS
          cp temp-binaries/macos/sytra-studio binaries/macos/
          cp temp-binaries/macos/sytra-mcp binaries/macos/
          
          # Copy Linux
          cp temp-binaries/linux/sytra-studio binaries/linux/
          cp temp-binaries/linux/sytra-mcp binaries/linux/
          
          # Clean temp files
          rm -rf temp-binaries

      - name: Commit and Push Binaries
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update release binaries for Windows, macOS, and Linux [skip ci]"
          file_pattern: "binaries/**"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
